version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: movie_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - movie_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movie_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    depends_on:
      - mongodb
    networks:
      - movie_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movie_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - movie_network

volumes:
  mongodb_data:

networks:
  movie_network:
    driver: bridge
